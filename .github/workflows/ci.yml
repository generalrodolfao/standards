name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: ruff check aurum/ tests/ --output-format=github
      - run: ruff format --check aurum/ tests/
      - run: pytest tests/ -v --cov=aurum --cov-report=term-missing
